<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株式会社Full Bet Management設立 | Full Bet Management</title>
  <link rel="icon" type="image/png" href="/FullBetManagement_logo_mark_red.png" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="min-h-screen bg-white text-slate-900 font-sans">
    <!-- Header -->
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-6 flex justify-between items-center">
      <a class="flex items-center gap-3" href="/">
        <img src="/FBM2.png" alt="Full Bet Management" class="h-8 md:h-12 w-auto" />
        <span class="sr-only">FULL BET MANAGEMENT</span>
      </a>
      <div class="hidden md:flex flex-1 items-center justify-end gap-10 text-base font-semibold text-gray-700 mr-6">
        <a class="hover:text-[#CC0000] transition-colors" href="/service.html">サービス</a>
        <a class="hover:text-[#CC0000] transition-colors" href="/mission.html">ミッション</a>
        <a class="hover:text-[#CC0000] transition-colors" href="/culture.html">資料請求</a>
        <a class="hover:text-[#CC0000] transition-colors" href="/company.html">会社情報</a>
        <a class="hover:text-[#CC0000] transition-colors" href="/news.html">ニュース</a>
      </div>
      <div class="flex items-center gap-3">
        <a class="bg-[#CC0000] text-white text-xs md:text-sm font-bold px-4 py-2 md:px-6 md:py-2.5 whitespace-nowrap transition hover:bg-red-700 active:scale-95 shadow-lg" href="/contact.html">
          お問い合わせ
        </a>
        <button type="button" id="menu-toggle" class="md:hidden inline-flex items-center justify-center w-10 h-10 border border-gray-200 rounded-md text-gray-700 hover:text-[#CC0000] hover:border-[#CC0000] transition-colors" aria-expanded="false" aria-controls="mobile-nav" aria-label="メニュー">
          <span id="menu-icon" class="text-xl leading-none">≡</span>
        </button>
      </div>
      <div id="mobile-nav" class="md:hidden absolute left-0 top-full w-full bg-white/95 backdrop-blur-md border-b border-gray-100 transition-all duration-300 opacity-0 -translate-y-2 pointer-events-none">
        <div class="px-6 py-5 flex flex-col gap-4 text-sm font-semibold text-gray-700">
          <a class="hover:text-[#CC0000] transition-colors" href="/service.html">サービス</a>
          <a class="hover:text-[#CC0000] transition-colors" href="/mission.html">ミッション</a>
          <a class="hover:text-[#CC0000] transition-colors" href="/culture.html">資料請求</a>
          <a class="hover:text-[#CC0000] transition-colors" href="/company.html">会社情報</a>
          <a class="hover:text-[#CC0000] transition-colors" href="/news.html">ニュース</a>
        </div>
      </div>
    </nav>

    <main class="pt-32 pb-24 px-6">
      <div class="max-w-5xl mx-auto">
        <div class="bg-white w-full h-[260px] md:h-[320px] flex items-center justify-center overflow-hidden shadow-[0_12px_30px_rgba(0,0,0,0.12)] mb-10">
          <img src="/FBM3.jpg" alt="Full Bet Management" class="w-full h-full object-contain p-8" />
        </div>
        <div class="flex items-center gap-3 text-sm text-gray-600 mb-6">
          <span class="font-semibold">26.01.15</span>
          <span class="px-2.5 py-0.5 text-xs rounded-full bg-slate-900 text-white">ALL</span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-8">株式会社Full Bet Management設立</h1>
        <div class="space-y-6 text-sm md:text-base text-gray-700 leading-relaxed">
          <p>株式会社Full Bet Managementが設立されました。</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black py-16 px-6">
      <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-start gap-8">
        <a class="flex items-center" href="/">
          <img src="/FBM4.png" alt="Full Bet Management" class="h-10 md:h-12 w-auto" />
          <span class="sr-only">FULL BET MANAGEMENT</span>
        </a>
        <div class="text-gray-300 text-xs flex flex-col gap-3 md:items-end">
          <a class="hover:text-white transition-colors" href="/privacy.html">個人情報保護方針</a>
          <span>©2026 Full Bet Management Inc. All Rights Reserved.</span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Mobile Menu Toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mobileNav = document.getElementById('mobile-nav');
    const menuIcon = document.getElementById('menu-icon');
    let isMenuOpen = false;

    menuToggle.addEventListener('click', () => {
      isMenuOpen = !isMenuOpen;
      menuToggle.setAttribute('aria-expanded', isMenuOpen);
      menuIcon.textContent = isMenuOpen ? '×' : '≡';
      if (isMenuOpen) {
        mobileNav.classList.remove('opacity-0', '-translate-y-2', 'pointer-events-none');
        mobileNav.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
      } else {
        mobileNav.classList.add('opacity-0', '-translate-y-2', 'pointer-events-none');
        mobileNav.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
      }
    });
  </script>
</body>
</html>
